return lines.join("\n");}

var tc=["#C4614B","#D4964A","#7A7D45"];var tpills=(p.keyThemes||[]).map(function(t,i){return'<span class="pill" style="background:'+tc[i%3]+'33;color:'+tc[i%3]+'">'+esc(t)+'</span>';}).join("");
app.innerHTML='<div><div class="phdr">'+headerBrand()+'<button class="hbtn" id="npBtn">'+(ar?"خطة جديدة":"New plan")+'</button></div><div class="pbody">'+advHTML+'<div class="sumcard"><div class="sumt">'+(ar?"خطة المحتوى لـ 30 يوم":"Your 30-Day Content Plan")+'</div><div class="sums" style="text-align:'+(isRTL?"right":"left")+'">'+esc(p.summary)+'</div><div class="pills">'+tpills+'</div></div><div class="dlrow"><button class="dlbtn" id="dlBtn">'+(ar?"⬇ نزّل الخطة كاملة":"⬇ Download full plan")+'</button></div>'+wHTML+'<div class="ctabox"><div class="ctat">🚀 '+(ar?"رقّي لباقة استشارة (جلستين) — 99$":"Upgrade to a Consultation package (2 sessions) — $99 (standard $199)")+'</div><div class="ctas">'+(ar?"شراء الـ Toolkit بـ 59$ يخليك مؤهل للترقية. جلستين، 45-60 دقيقة، مراجعة مباشرة لاستراتيجيتك وتقييم تقدمك.":"Your $59 toolkit purchase makes you eligible. 2 sessions, 45–60 min each — live strategy audit plus a progress check.")+'</div></div></div></div>';
